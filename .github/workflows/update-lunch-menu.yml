name: Update Lunch Menu

on:
  schedule:
    - cron: '0 17 * * 1-5'  # 12:00 PM Central Time, Monday-Friday
  workflow_dispatch:

jobs:
  update_lunch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak ffmpeg
          pip install requests beautifulsoup4 selenium
      
      - name: Generate lunch audio
        run: |
          python3 << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime, timedelta
          import subprocess
          import re
          
          # Get tomorrow's date
          tomorrow = datetime.now() + timedelta(days=1)
          
          # Skip to next weekday if weekend
          if tomorrow.weekday() == 5:  # Saturday
              tomorrow += timedelta(days=2)
          elif tomorrow.weekday() == 6:  # Sunday
              tomorrow += timedelta(days=1)
          
          day_name = tomorrow.strftime("%A")
          date_str = tomorrow.strftime("%B %d")
          tomorrow_date = tomorrow.strftime("%m/%d/%Y")
          
          # Scrape SchoolCafe
          try:
              url = "https://www.schoolcafe.com/menus/0"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              }
              response = requests.get(url, headers=headers, timeout=10)
              response.raise_for_status()
              
              soup = BeautifulSoup(response.content, 'html.parser')
              
              # Look for menu items for tomorrow's date
              menu_item = None
              
              # Try to find the date in the page
              date_elements = soup.find_all(string=re.compile(tomorrow_date))
              
              if date_elements:
                  for elem in date_elements:
                      parent = elem.parent
                      # Look for menu items near the date
                      for sibling in parent.find_next_siblings():
                          text = sibling.get_text(strip=True)
                          if text and len(text) > 3 and not any(x in text.lower() for x in ['sunbutter', 'jelly', 'fiesta', 'salad']):
                              menu_item = text
                              break
                      if menu_item:
                          break
              
              if not menu_item:
                  # Fallback: look for any lunch menu text
                  lunch_section = soup.find(string=re.compile('Lunch', re.IGNORECASE))
                  if lunch_section:
                      parent = lunch_section.parent.parent
                      items = parent.find_all('div', class_=re.compile('menu|item', re.IGNORECASE))
                      if items:
                          for item in items:
                              text = item.get_text(strip=True)
                              if text and len(text) > 3 and not any(x in text.lower() for x in ['sunbutter', 'jelly', 'fiesta', 'salad']):
                                  menu_item = text
                                  break
              
              if not menu_item:
                  menu_item = "pizza"
                  print(f"Could not find menu item, using default: {menu_item}")
              else:
                  print(f"Found menu item: {menu_item}")
              
          except Exception as e:
              print(f"Error scraping SchoolCafe: {e}")
              menu_item = "pizza"
          
          # Create speech text
          speech = f"The lunch menu for tomorrow {day_name} {date_str} is: {menu_item}"
          
          print(f"Generating audio: {speech}")
          
          # Generate audio
          subprocess.run(['espeak', '-w', 'lunch.wav', '-s', '150', speech])
          subprocess.run(['ffmpeg', '-i', 'lunch.wav', '-c:a', 'aac', '-b:a', '128k', '-y', 'lunch.m4a'], 
                        capture_output=True)
          
          print("Audio generated successfully!")
          EOF
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lunch.m4a
          git diff --quiet --cached || (git commit -m "Update lunch menu for $(date +'%Y-%m-%d')" && git push)
